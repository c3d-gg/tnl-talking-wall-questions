<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<title>Talking Wall · True or False</title>
<style>
  :root{
    --bg:#0e1116;
    --panel:#171b22;
    --panel-2:#1e232c;
    --border:#2a313c;
    --text:#e7ecf3;
    --muted:#9aa6b6;
    --accent:#5b9dff;
    --true:#3ecf8e;
    --true-bg:rgba(62,207,142,.12);
    --false:#ff6b6b;
    --false-bg:rgba(255,107,107,.12);
    --mark:#ffd76a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:820px;margin:0 auto;padding:0 16px calc(48px + env(safe-area-inset-bottom))}
  header{
    position:sticky;top:0;z-index:10;
    background:linear-gradient(var(--bg) 72%, rgba(14,17,22,0));
    padding-top:calc(16px + env(safe-area-inset-top));
    padding-bottom:12px;
  }
  h1{font-size:18px;margin:0 0 12px;font-weight:650;letter-spacing:.2px}
  h1 span{color:var(--muted);font-weight:400}
  .searchbox{position:relative}
  #q{
    width:100%;
    font-size:16px; /* prevents iOS zoom */
    padding:14px 44px 14px 44px;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--panel);
    color:var(--text);
    outline:none;
    transition:border-color .15s,box-shadow .15s;
  }
  #q:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,157,255,.18)}
  #q::placeholder{color:var(--muted)}
  .icon{position:absolute;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .icon.search{left:14px}
  .clear{
    right:8px;left:auto;pointer-events:auto;cursor:pointer;
    border:0;background:transparent;color:var(--muted);
    font-size:20px;padding:6px 10px;border-radius:10px;line-height:1;
    display:none;
  }
  .clear:hover{color:var(--text);background:var(--panel-2)}
  .clear.show{display:block}
  .controls{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .seg button{
    border:0;background:transparent;color:var(--muted);
    padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
  }
  .seg button.active{background:var(--panel-2);color:var(--text)}
  .seg button[data-f="TRUE"].active{color:var(--true)}
  .seg button[data-f="FALSE"].active{color:var(--false)}
  .count{margin-left:auto;color:var(--muted);font-size:13px}
  .hint{color:var(--muted);font-size:12px;margin-top:8px}
  kbd{background:var(--panel-2);border:1px solid var(--border);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:11px;font-family:inherit}
  ul{list-style:none;margin:8px 0 0;padding:0}
  li{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
    display:flex;gap:12px;align-items:flex-start;
  }
  .badge{
    flex:none;font-size:11px;font-weight:700;letter-spacing:.5px;
    padding:4px 8px;border-radius:8px;margin-top:2px;min-width:52px;text-align:center;
  }
  .badge.TRUE{color:var(--true);background:var(--true-bg)}
  .badge.FALSE{color:var(--false);background:var(--false-bg)}
  .qtext{flex:1;font-size:15px}
  mark{background:transparent;color:var(--mark);font-weight:700;border-radius:3px}
  .empty{text-align:center;color:var(--muted);padding:48px 16px}
  .empty b{color:var(--text)}
  footer{margin-top:28px;padding-top:16px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;text-align:center}
  footer a{color:var(--accent);text-decoration:none}
  footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Talking Wall <span>· True or False search</span></h1>
    <div class="searchbox">
      <svg class="icon search" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="search" inputmode="search" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="Search any word or phrase…" aria-label="Search questions">
      <button class="icon clear" id="clear" aria-label="Clear search">&times;</button>
    </div>
    <div class="controls">
      <div class="seg" role="group" aria-label="Filter by answer">
        <button data-f="ALL" class="active">All</button>
        <button data-f="TRUE">True</button>
        <button data-f="FALSE">False</button>
      </div>
      <span class="count" id="count"></span>
    </div>
    <div class="hint">Just start typing anywhere · <kbd>/</kbd> jumps to search · <kbd>Esc</kbd> clears</div>
  </header>
  <ul id="list" aria-live="polite"></ul>
  <div class="empty" id="empty" style="display:none"></div>
  <footer>
    Questions compiled by
    <a href="https://www.reddit.com/r/throneandliberty/comments/1uirrjg/every_talking_wall_question/" target="_blank" rel="noopener">u/Natural-Half-5708</a>
    on r/throneandliberty — thank you! 🙏
  </footer>
</div>

<script src="questions.js"></script>
<script>
(function(){
  var DATA = window.QUESTIONS || [];
  var q = document.getElementById('q');
  var list = document.getElementById('list');
  var empty = document.getElementById('empty');
  var count = document.getElementById('count');
  var clearBtn = document.getElementById('clear');
  var segBtns = Array.prototype.slice.call(document.querySelectorAll('.seg button'));
  var filter = 'ALL';

  // Precompute lowercase for fast matching
  DATA.forEach(function(it){ it._l = it.text.toLowerCase(); });

  function escHtml(s){
    return s.replace(/[&<>"]/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }

  // Highlight all search tokens in the text
  function highlight(text, tokens){
    if(!tokens.length) return escHtml(text);
    // Build regex matching any token (escaped)
    var esc = tokens.map(function(t){ return t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); });
    var re = new RegExp('('+esc.join('|')+')','gi');
    var out = '', last = 0, m;
    while((m = re.exec(text))){
      out += escHtml(text.slice(last, m.index));
      out += '<mark>'+escHtml(m[0])+'</mark>';
      last = m.index + m[0].length;
      if(m.index === re.lastIndex) re.lastIndex++; // avoid zero-length loop
    }
    out += escHtml(text.slice(last));
    return out;
  }

  function render(){
    var raw = q.value.trim();
    var tokens = raw.toLowerCase().split(/\s+/).filter(Boolean);
    clearBtn.classList.toggle('show', raw.length > 0);

    var results = DATA.filter(function(it){
      if(filter !== 'ALL' && it.answer !== filter) return false;
      // omni: every token must appear somewhere in the text
      for(var i=0;i<tokens.length;i++){ if(it._l.indexOf(tokens[i]) === -1) return false; }
      return true;
    });

    var html = '';
    for(var i=0;i<results.length;i++){
      var it = results[i];
      html += '<li><span class="badge '+it.answer+'">'+it.answer+'</span>'
            + '<span class="qtext">'+highlight(it.text, tokens)+'</span></li>';
    }
    list.innerHTML = html;

    var total = DATA.filter(function(it){ return filter==='ALL'||it.answer===filter; }).length;
    count.textContent = results.length + (raw ? ' / '+total : '') + ' shown';

    if(results.length === 0){
      empty.style.display = 'block';
      empty.innerHTML = raw
        ? 'No matches for <b>'+escHtml(raw)+'</b>'
        : 'No questions in this filter.';
    } else {
      empty.style.display = 'none';
    }
  }

  q.addEventListener('input', render);
  q.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){
      q.value = '';
      render();
      // keep focus so the user can keep typing
      q.focus();
    }
  });
  clearBtn.addEventListener('click', function(){
    q.value=''; render(); q.focus();
  });
  segBtns.forEach(function(b){
    b.addEventListener('click', function(){
      segBtns.forEach(function(x){ x.classList.remove('active'); });
      b.classList.add('active');
      filter = b.getAttribute('data-f');
      render();
    });
  });

  // Global keyboard: start typing anywhere and it goes to the search box
  document.addEventListener('keydown', function(e){
    if(document.activeElement === q) return;      // already typing in the box
    if(e.metaKey || e.ctrlKey || e.altKey) return; // don't hijack shortcuts

    if(e.key === 'Escape'){
      q.value=''; render(); q.focus();
      return;
    }
    // '/' is an explicit "focus search" hotkey (common convention)
    if(e.key === '/'){
      e.preventDefault(); q.focus(); q.select();
      return;
    }
    // Any single printable character focuses the box and lets it type normally
    if(e.key.length === 1){
      q.focus();
      // don't preventDefault — the keystroke flows into the now-focused input
    } else if(e.key === 'Backspace'){
      e.preventDefault();
      q.focus();
      q.value = q.value.slice(0, -1);
      render();
    }
  });

  render();
})();
</script>

</html>
